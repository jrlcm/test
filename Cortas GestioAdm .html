let answeredQuestions = JSON.parse(localStorage.getItem("answeredQuestions")) || [];
let currentQuestion = 0;
let score = 0;
let quizData = [];

const container = document.getElementById("quiz-container");
const resultDiv = document.getElementById("result");
const nextBtn = document.getElementById("nextBtn");
const resetBtn = document.getElementById("resetBtn");

const totalQuestionsText = document.getElementById("totalQuestionsText");
const pendingQuestionsText = document.getElementById("pendingQuestionsText");
const completedQuestionsText = document.getElementById("completedQuestionsText");

function updateProgressPanel() {
  const total = allQuestions.length;
  const completed = answeredQuestions.length;
  const pending = total - completed;

  totalQuestionsText.textContent = `Preguntas totales: ${total}`;
  pendingQuestionsText.textContent = `Preguntas pendientes: ${pending}`;
  completedQuestionsText.textContent = `Preguntas realizadas: ${completed}`;
}

function prepareQuiz() {

  updateProgressPanel();

  let availableQuestions = allQuestions
    .map((question, index) => index)
    .filter(index => !answeredQuestions.includes(index));

  shuffle(availableQuestions);

  quizData = availableQuestions.map(index => {
    return {
      ...allQuestions[index],
      originalIndex: index
    };
  });

  showQuestion();
}

function showQuestion() {

  container.innerHTML = "";
  nextBtn.style.display = "none";

  if (currentQuestion >= quizData.length) {

    container.innerHTML = `
      <div class="question">
        <p>Quiz terminado</p>
        <p>Puntuación final: ${score}/${quizData.length}</p>
      </div>
    `;

    return;
  }

  const q = quizData[currentQuestion];

  const div = document.createElement("div");
  div.className = "question";

  const p = document.createElement("p");
  p.textContent = `${currentQuestion + 1}. ${q.question}`;

  div.appendChild(p);

  const optionsDiv = document.createElement("div");
  optionsDiv.className = "options";

  const filteredOptions = q.options.filter(opt => opt.trim() !== "");

  // ============================
  // RESPUESTA CORTA
  // ============================
  if (
    filteredOptions.length === 1 &&
    filteredOptions[0] === "Resposta curta"
  ) {

    const showBtn = document.createElement("button");

    showBtn.textContent = "Mostrar resposta";

    showBtn.className = "main-btn";

    showBtn.onclick = () => {

      if (!div.querySelector(".short-answer")) {

        const answerDiv = document.createElement("div");

        answerDiv.className = "short-answer";

        answerDiv.innerHTML = `
          <strong>Resposta:</strong><br><br>
          ${q.answer}
        `;

        div.appendChild(answerDiv);
      }

      const originalIndex = q.originalIndex;

      if (!answeredQuestions.includes(originalIndex)) {

        answeredQuestions.push(originalIndex);

        localStorage.setItem(
          "answeredQuestions",
          JSON.stringify(answeredQuestions)
        );
      }

      updateProgressPanel();

      nextBtn.style.display = "block";

      showBtn.disabled = true;

      showBtn.textContent = "Resposta mostrada";
    };

    optionsDiv.appendChild(showBtn);

    div.appendChild(optionsDiv);

    container.appendChild(div);

    return;
  }

  // ============================
  // V/F Y TEST NORMAL
  // ============================

  shuffle(filteredOptions);

  filteredOptions.forEach(option => {

    const btn = document.createElement("button");

    btn.textContent = option;

    btn.dataset.correct = option === q.answer ? "true" : "false";

    btn.onclick = () => {

      const allBtns = optionsDiv.querySelectorAll("button");

      allBtns.forEach(b => b.disabled = true);

      const originalIndex = q.originalIndex;

      if (!answeredQuestions.includes(originalIndex)) {

        answeredQuestions.push(originalIndex);

        localStorage.setItem(
          "answeredQuestions",
          JSON.stringify(answeredQuestions)
        );
      }

      updateProgressPanel();

      if (btn.dataset.correct === "true") {

        btn.classList.add("correct");

        score++;

      } else {

        btn.classList.add("wrong");

        allBtns.forEach(b => {

          if (b.dataset.correct === "true") {

            b.classList.add("correct");
          }
        });
      }

      resultDiv.textContent = `Puntuación: ${score}/${quizData.length}`;

      nextBtn.style.display = "block";
    };

    optionsDiv.appendChild(btn);
  });

  div.appendChild(optionsDiv);

  container.appendChild(div);
}

nextBtn.onclick = () => {

  currentQuestion++;

  showQuestion();
};

resetBtn.onclick = () => {

  localStorage.removeItem("answeredQuestions");

  location.reload();
};

prepareQuiz();

</script>
