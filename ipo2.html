<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz IPO2</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #f4f4f4;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin: 20px 0 5px 0;
  }

  .subtitle {
    font-size: 16px;
    color: #555;
    margin-bottom: 15px;
    text-align: center;
  }

  .top-panel {
    width: 90%;
    max-width: 600px;
    background: #fff;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .top-panel p {
    margin: 5px 0;
    font-size: 16px;
  }

  .quiz-container {
    width: 90%;
    max-width: 600px;
    margin-bottom: 30px;
    padding-top: 10px;
  }

  .question {
    background: #fff;
    padding: 20px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .question p {
    font-size: 32px;
    font-weight: bold;
    line-height: 1.4;
    margin: 0 0 30px 0;
  }

  .options {
    margin-top: 20px;
  }

  .options button {
    display: block;
    margin: 10px 0;
    padding: 15px;
    width: 100%;
    border-radius: 5px;
    border: 1px solid #ccc;
    cursor: pointer;
    background: #eee;
    transition: background 0.3s;
    font-size: 22px;
    text-transform: uppercase;
  }

  .options button:hover {
    background: #ddd;
  }

  .correct {
    background-color: #c8e6c9 !important;
    border-color: #388e3c !important;
    color: #2e7d32 !important;
  }

  .wrong {
    background-color: #ffcdd2 !important;
    border-color: #d32f2f !important;
    color: #c62828 !important;
  }

  .result {
    font-weight: bold;
    font-size: 1.3em;
    margin: 10px 0;
  }

  .buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button.main-btn {
    padding: 12px 25px;
    border: none;
    border-radius: 6px;
    background: #2196F3;
    color: white;
    font-size: 1.1em;
    cursor: pointer;
  }

  button.main-btn:hover {
    background: #1976D2;
  }

  button.reset-btn {
    padding: 12px 25px;
    border: none;
    border-radius: 6px;
    background: #e53935;
    color: white;
    font-size: 1.1em;
    cursor: pointer;
  }

  button.reset-btn:hover {
    background: #c62828;
  }

  .short-answer {
    margin-top: 25px;
    padding: 20px;
    background: #e3f2fd;
    border-left: 6px solid #2196F3;
    border-radius: 8px;
    font-size: 24px;
    line-height: 1.5;
    color: #0d47a1;
  }
</style>
</head>

<body>

<h1>Quiz IPO2</h1>
<div class="subtitle">Preguntas aleatorias sin repetir</div>

<div class="top-panel">
  <p id="totalQuestionsText">Preguntas totales: 0</p>
  <p id="pendingQuestionsText">Preguntas pendientes: 0</p>
  <p id="completedQuestionsText">Preguntas realizadas: 0</p>
</div>

<div class="quiz-container" id="quiz-container"></div>

<div class="result" id="result">Puntuación: 0</div>

<div class="buttons">
  <button id="nextBtn" class="main-btn" style="display:none;">Siguiente</button>
  <button id="resetBtn" class="reset-btn">Reiniciar progreso</button>
</div>

<script>

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

const allQuestions =[
  {
    "question":"Què és l’emprenedoria?",
    "options":["Resposta curta"],
    "answer":"La emprendeduría es la capacidad de identificar oportunidades y transformarlas en proyectos o ideas que aporten valor económico, social o ambiental."
  },
  {
    "question":"Què és l’esperit emprenedor?",
    "options":["Resposta curta"],
    "answer":"El espíritu emprendedor es la actitud de tomar iniciativa, asumir riesgos calculados y buscar oportunidades de mejora o innovación."
  },
  {
    "question":"Què és l’autoocupació?",
    "options":["Resposta curta"],
    "answer":"La autoocupación consiste en crear el propio puesto de trabajo mediante una actividad profesional o empresarial propia."
  },
  {
    "question":"Què és la cultura emprenedora?",
    "options":["Resposta curta"],
    "answer":"La cultura emprendedora es el conjunto de valores, habilidades y actitudes relacionadas con la creatividad, la innovación y la iniciativa."
  },
  {
    "question":"Què és la intraemprenedoria?",
    "options":["Resposta curta"],
    "answer":"La intraemprendeduría consiste en innovar y desarrollar proyectos dentro de una empresa ya existente."
  },
  {
    "question":"Què és l’emprenedoria social?",
    "options":["Resposta curta"],
    "answer":"La emprendeduría social busca solucionar problemas sociales o ambientales mediante proyectos sostenibles e innovadores."
  },
  {
    "question":"Què és la innovació?",
    "options":["Resposta curta"],
    "answer":"La innovación consiste en introducir mejoras o nuevas ideas en productos, servicios o procesos para aportar valor."
  },
  {
    "question":"Què és la innovació sostenible?",
    "options":["Resposta curta"],
    "answer":"La innovación sostenible busca mejorar productos o procesos teniendo en cuenta el impacto económico, social y ambiental."
  },
  {
    "question":"Què són els ODS?",
    "options":["Resposta curta"],
    "answer":"Los ODS son los Objetivos de Desarrollo Sostenible de la Agenda 2030 impulsada por Naciones Unidas."
  },
  {
    "question":"Què és el desenvolupament sostenible?",
    "options":["Resposta curta"],
    "answer":"El desarrollo sostenible consiste en satisfacer las necesidades actuales sin perjudicar a las generaciones futuras."
  },

  {
    "question":"Què és l’economia circular?",
    "options":["Resposta curta"],
    "answer":"La economía circular es un modelo que busca reducir residuos, reutilizar materiales y aprovechar mejor los recursos."
  },
  {
    "question":"Dona un exemple d’innovació sostenible.",
    "options":["Resposta curta"],
    "answer":"Un ejemplo de innovación sostenible sería digitalizar documentos para reducir el consumo de papel y recursos."
  },
  {
    "question":"Quines característiques té una persona emprenedora?",
    "options":["Resposta curta"],
    "answer":"Una persona emprendedora suele tener iniciativa, creatividad, resiliencia, capacidad de adaptación y motivación."
  },
  {
    "question":"Què és la proactivitat?",
    "options":["Resposta curta"],
    "answer":"La proactividad es la capacidad de actuar y anticiparse a problemas o necesidades antes de que aparezcan."
  },
  {
    "question":"Què és la resiliència?",
    "options":["Resposta curta"],
    "answer":"La resiliencia es la capacidad de superar dificultades, adaptarse y continuar avanzando."
  },
  {
    "question":"Què és assumir riscos calculats?",
    "options":["Resposta curta"],
    "answer":"Asumir riesgos calculados significa tomar decisiones después de analizar las posibles consecuencias."
  },
  {
    "question":"Què és el treball col·laboratiu?",
    "options":["Resposta curta"],
    "answer":"El trabajo colaborativo consiste en trabajar en equipo compartiendo objetivos, tareas y conocimientos."
  },
  {
    "question":"Què és la creativitat?",
    "options":["Resposta curta"],
    "answer":"La creatividad es la capacidad de generar ideas nuevas u originales para resolver problemas."
  },
  {
    "question":"Què és el pensament crític?",
    "options":["Resposta curta"],
    "answer":"El pensamiento crítico consiste en analizar información y tomar decisiones razonadas y fundamentadas."
  },
  {
    "question":"Què és la competència digital?",
    "options":["Resposta curta"],
    "answer":"La competencia digital es la capacidad de utilizar herramientas digitales de forma segura y eficiente."
  },

  {
    "question":"Per què és important la competència digital?",
    "options":["Resposta curta"],
    "answer":"La competencia digital es importante porque facilita la comunicación, el trabajo y la innovación."
  },
  {
    "question":"Què és la transformació digital?",
    "options":["Resposta curta"],
    "answer":"La transformación digital consiste en incorporar tecnología digital para mejorar procesos y servicios."
  },
  {
    "question":"Què és la innovació tecnològica?",
    "options":["Resposta curta"],
    "answer":"La innovación tecnológica consiste en aplicar tecnología para mejorar productos, servicios o procesos."
  },
  {
    "question":"Què és la identitat digital?",
    "options":["Resposta curta"],
    "answer":"La identidad digital es la imagen o información que una persona proyecta en internet."
  },
  {
    "question":"Què és la petjada digital?",
    "options":["Resposta curta"],
    "answer":"La huella digital es el rastro de información que dejamos al utilizar internet y herramientas digitales."
  },
  {
    "question":"Per què cal protegir les dades personals?",
    "options":["Resposta curta"],
    "answer":"Es importante proteger los datos personales para evitar problemas de seguridad o usos indebidos."
  },
  {
    "question":"Què és la bretxa digital?",
    "options":["Resposta curta"],
    "answer":"La brecha digital es la desigualdad en el acceso o uso de las tecnologías digitales."
  },
  {
    "question":"Què és una eina digital col·laborativa?",
    "options":["Resposta curta"],
    "answer":"Es una herramienta digital que facilita el trabajo en equipo y la comunicación entre personas."
  },
  {
    "question":"Què és la innovació oberta?",
    "options":["Resposta curta"],
    "answer":"La innovación abierta consiste en incorporar ideas y colaboraciones externas a una organización."
  },
  {
    "question":"Què és el crowdsourcing?",
    "options":["Resposta curta"],
    "answer":"El crowdsourcing consiste en obtener ideas o soluciones de un grupo amplio de personas."
  },

  {
    "question":"Què és la Blue Ocean Strategy?",
    "options":["Resposta curta"],
    "answer":"Es una estrategia que busca crear mercados nuevos con poca competencia."
  },
  {
    "question":"Què és una metodologia àgil?",
    "options":["Resposta curta"],
    "answer":"Una metodología ágil es una forma de trabajo flexible y adaptada a cambios continuos."
  },
  {
    "question":"Què és el Design Thinking?",
    "options":["Resposta curta"],
    "answer":"El Design Thinking es una metodología centrada en las necesidades reales de las personas usuarias."
  },
  {
    "question":"Què és Lean Startup?",
    "options":["Resposta curta"],
    "answer":"Lean Startup es una metodología basada en crear, medir y aprender para validar ideas rápidamente."
  },
  {
    "question":"Què és el Business Model Canvas?",
    "options":["Resposta curta"],
    "answer":"El Business Model Canvas es una herramienta visual para organizar y analizar un modelo de negocio."
  },
  {
    "question":"Què és modernitzar el sector productiu?",
    "options":["Resposta curta"],
    "answer":"Modernizar el sector productivo consiste en mejorar procesos mediante innovación y tecnología."
  },
  {
    "question":"Què és la innovació social?",
    "options":["Resposta curta"],
    "answer":"La innovación social consiste en crear soluciones que mejoren la sociedad y el bienestar colectivo."
  },
  {
    "question":"Què és la responsabilitat social?",
    "options":["Resposta curta"],
    "answer":"La responsabilidad social implica actuar de forma ética y respetuosa con la sociedad y el medio ambiente."
  },
  {
    "question":"Què és la col·laboració interdisciplinària?",
    "options":["Resposta curta"],
    "answer":"La colaboración interdisciplinaria consiste en trabajar con personas de diferentes áreas o especialidades."
  },
  {
    "question":"Què és la resolució creativa de problemes?",
    "options":["Resposta curta"],
    "answer":"La resolución creativa de problemas consiste en encontrar soluciones innovadoras ante dificultades."
  }
];

let answeredQuestions = JSON.parse(localStorage.getItem("answeredQuestions")) || [];
let currentQuestion = 0;
let score = 0;
let quizData = [];

const container = document.getElementById("quiz-container");
const resultDiv = document.getElementById("result");
const nextBtn = document.getElementById("nextBtn");
const resetBtn = document.getElementById("resetBtn");

const totalQuestionsText = document.getElementById("totalQuestionsText");
const pendingQuestionsText = document.getElementById("pendingQuestionsText");
const completedQuestionsText = document.getElementById("completedQuestionsText");

function updateProgressPanel() {
  const total = allQuestions.length;
  const completed = answeredQuestions.length;
  const pending = total - completed;

  totalQuestionsText.textContent = `Preguntas totales: ${total}`;
  pendingQuestionsText.textContent = `Preguntas pendientes: ${pending}`;
  completedQuestionsText.textContent = `Preguntas realizadas: ${completed}`;
}

function prepareQuiz() {

  updateProgressPanel();

  let availableQuestions = allQuestions
    .map((question, index) => index)
    .filter(index => !answeredQuestions.includes(index));

  shuffle(availableQuestions);

  quizData = availableQuestions.map(index => {
    return {
      ...allQuestions[index],
      originalIndex: index
    };
  });

  showQuestion();
}

function showQuestion() {

  container.innerHTML = "";
  nextBtn.style.display = "none";

  if (currentQuestion >= quizData.length) {

    container.innerHTML = `
      <div class="question">
        <p>Quiz terminado</p>
        <p>Puntuación final: ${score}/${quizData.length}</p>
      </div>
    `;

    return;
  }

  const q = quizData[currentQuestion];

  const div = document.createElement("div");
  div.className = "question";

  const p = document.createElement("p");
  p.textContent = `${currentQuestion + 1}. ${q.question}`;

  div.appendChild(p);

  const optionsDiv = document.createElement("div");
  optionsDiv.className = "options";

  const filteredOptions = q.options.filter(opt => opt.trim() !== "");

  // ============================
  // RESPUESTA CORTA
  // ============================
  if (
    filteredOptions.length === 1 &&
    filteredOptions[0] === "Resposta curta"
  ) {

    const showBtn = document.createElement("button");

    showBtn.textContent = "Mostrar resposta";

    showBtn.className = "main-btn";

    showBtn.onclick = () => {

      if (!div.querySelector(".short-answer")) {

        const answerDiv = document.createElement("div");

        answerDiv.className = "short-answer";

        answerDiv.innerHTML = `
          <strong>Resposta:</strong><br><br>
          ${q.answer}
        `;

        div.appendChild(answerDiv);
      }

      const originalIndex = q.originalIndex;

      if (!answeredQuestions.includes(originalIndex)) {

        answeredQuestions.push(originalIndex);

        localStorage.setItem(
          "answeredQuestions",
          JSON.stringify(answeredQuestions)
        );
      }

      updateProgressPanel();

      nextBtn.style.display = "block";

      showBtn.disabled = true;

      showBtn.textContent = "Resposta mostrada";
    };

    optionsDiv.appendChild(showBtn);

    div.appendChild(optionsDiv);

    container.appendChild(div);

    return;
  }

  // ============================
  // V/F Y TEST NORMAL
  // ============================

  shuffle(filteredOptions);

  filteredOptions.forEach(option => {

    const btn = document.createElement("button");

    btn.textContent = option;

    btn.dataset.correct = option === q.answer ? "true" : "false";

    btn.onclick = () => {

      const allBtns = optionsDiv.querySelectorAll("button");

      allBtns.forEach(b => b.disabled = true);

      const originalIndex = q.originalIndex;

      if (!answeredQuestions.includes(originalIndex)) {

        answeredQuestions.push(originalIndex);

        localStorage.setItem(
          "answeredQuestions",
          JSON.stringify(answeredQuestions)
        );
      }

      updateProgressPanel();

      if (btn.dataset.correct === "true") {

        btn.classList.add("correct");

        score++;

      } else {

        btn.classList.add("wrong");

        allBtns.forEach(b => {

          if (b.dataset.correct === "true") {

            b.classList.add("correct");
          }
        });
      }

      resultDiv.textContent = `Puntuación: ${score}/${quizData.length}`;

      nextBtn.style.display = "block";
    };

    optionsDiv.appendChild(btn);
  });

  div.appendChild(optionsDiv);

  container.appendChild(div);
}

nextBtn.onclick = () => {

  currentQuestion++;

  showQuestion();
};

resetBtn.onclick = () => {

  localStorage.removeItem("answeredQuestions");

  location.reload();
};

prepareQuiz();

</script>

</body>
</html>
