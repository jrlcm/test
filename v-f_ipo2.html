function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

  */

/* ============================
   VARIABLES PRINCIPALES
============================ */
let answeredQuestions = JSON.parse(localStorage.getItem("answeredQuestions")) || [];
let currentQuestion = 0;
let score = 0;
let quizData = [];

const container = document.getElementById("quiz-container");
const resultDiv = document.getElementById("result");
const nextBtn = document.getElementById("nextBtn");
const resetBtn = document.getElementById("resetBtn");

const totalQuestionsText = document.getElementById("totalQuestionsText");
const pendingQuestionsText = document.getElementById("pendingQuestionsText");
const completedQuestionsText = document.getElementById("completedQuestionsText");


/* ============================
   ACTUALIZAR PANEL SUPERIOR
============================ */
function updateProgressPanel() {
  const total = allQuestions.length;
  const completed = answeredQuestions.length;
  const pending = total - completed;

  totalQuestionsText.textContent = `Preguntas totales: ${total}`;
  pendingQuestionsText.textContent = `Preguntas pendientes: ${pending}`;
  completedQuestionsText.textContent = `Preguntas realizadas: ${completed}`;
}


/* ============================
   PREPARAR TEST
============================ */
function prepareQuiz() {
  if (allQuestions.length === 0) {
    container.innerHTML = `
      <div class="question">
        <p>No hay preguntas todavía.</p>
        <p class="small-text">Añade preguntas dentro de la variable allQuestions.</p>
      </div>
    `;
    return;
  }

  // Si ya has hecho todas, se reinicia automáticamente
  if (answeredQuestions.length >= allQuestions.length) {
    answeredQuestions = [];
    localStorage.removeItem("answeredQuestions");

    alert("Has completado todas las preguntas. Se reinicia el ciclo.");
  }

  updateProgressPanel();

  let availableQuestions = allQuestions
    .map((question, index) => index)
    .filter(index => !answeredQuestions.includes(index));

  let numberOfQuestionsToday = parseInt(
    prompt(`¿Cuántas preguntas quieres hacer hoy? Te quedan ${availableQuestions.length} pendientes.`)
  );

  if (
    isNaN(numberOfQuestionsToday) ||
    numberOfQuestionsToday <= 0 ||
    numberOfQuestionsToday > availableQuestions.length
  ) {
    numberOfQuestionsToday = availableQuestions.length;
  }

  shuffle(availableQuestions);

  let selectedIndexes = availableQuestions.slice(0, numberOfQuestionsToday);

  quizData = selectedIndexes.map(index => {
    return {
      ...allQuestions[index],
      originalIndex: index
    };
  });

  showQuestion();
}


/* ============================
   MOSTRAR PREGUNTA
============================ */
function showQuestion() {
  container.innerHTML = "";
  nextBtn.style.display = "none";

  if (currentQuestion >= quizData.length) {
    updateProgressPanel();

    const pending = allQuestions.length - answeredQuestions.length;

    container.innerHTML = `
      <div class="question">
        <p>Quiz terminado</p>
        <p>Tu puntuación final es ${score} de ${quizData.length}</p>
        <p class="small-text">
          Preguntas pendientes para otro día: ${pending}
        </p>
        ${
          pending === 0
          ? `<p class="small-text">Has completado todas las preguntas. La próxima vez se reiniciará el ciclo.</p>`
          : `<p class="small-text">La próxima vez saldrán preguntas que todavía no has hecho.</p>`
        }
      </div>
    `;

    resultDiv.textContent = `Puntuación final: ${score}/${quizData.length}`;
    return;
  }

  const q = quizData[currentQuestion];

  const div = document.createElement("div");
  div.className = "question";

  const p = document.createElement("p");
  p.textContent = `${currentQuestion + 1}. ${q.question}`;
  div.appendChild(p);

  const optionsDiv = document.createElement("div");
  optionsDiv.className = "options";

  const filteredOptions = q.options.filter(opt => opt.trim() !== "");

  // Si quieres que siempre salga V primero y F segundo, comenta la línea siguiente:
  shuffle(filteredOptions);

  filteredOptions.forEach(option => {
    const btn = document.createElement("button");
    btn.textContent = option;
    btn.dataset.correct = option === q.answer ? "true" : "false";

    btn.onclick = () => {
      const allBtns = optionsDiv.querySelectorAll("button");
      allBtns.forEach(b => b.disabled = true);

      // Guardamos esta pregunta como realizada justo al contestarla
      const originalIndex = q.originalIndex;

      if (!answeredQuestions.includes(originalIndex)) {
        answeredQuestions.push(originalIndex);
        localStorage.setItem("answeredQuestions", JSON.stringify(answeredQuestions));
      }

      updateProgressPanel();

      if (btn.dataset.correct === "true") {
        btn.classList.add("correct");
        score++;
      } else {
        btn.classList.add("wrong");

        allBtns.forEach(b => {
          if (b.dataset.correct === "true") {
            b.classList.add("correct");
          }
        });
      }

      resultDiv.textContent = `Puntuación: ${score}/${quizData.length}`;
      nextBtn.style.display = "block";
    };

    optionsDiv.appendChild(btn);
  });

  div.appendChild(optionsDiv);
  container.appendChild(div);
}


/* ============================
   BOTÓN SIGUIENTE
============================ */
nextBtn.onclick = () => {
  currentQuestion++;
  showQuestion();
};


/* ============================
   BOTÓN REINICIAR PROGRESO
============================ */
resetBtn.onclick = () => {
  const confirmReset = confirm("¿Seguro que quieres reiniciar el progreso? Volverán a salir todas las preguntas.");

  if (confirmReset) {
    localStorage.removeItem("answeredQuestions");
    location.reload();
  }
};


/* ============================
   INICIAR QUIZ
============================ */
prepareQuiz();
</script>
